```
    <div class="price-display">
        <div class="price-label">Huidige Koers</div>
        <div class="current-price" id="currentPrice">--</div>
        <div class="price-change" id="priceChange">Laden...</div>
    </div>

    <div class="input-group">
        <label for="priceLimit">Stel Limiet In (DKK)</label>
        <input type="number" id="priceLimit" step="0.01" placeholder="Bijv. 150.00">
    </div>

    <button class="button button-primary" id="startBtn">Start Monitoring</button>
    <button class="button button-secondary" id="stopBtn" style="display: none;">Stop Monitoring</button>

    <div class="status inactive" id="status">Monitoring is gestopt</div>
    <div class="last-update" id="lastUpdate"></div>
</div>

<div class="popup-overlay" id="popupOverlay">
    <div class="popup pulse">
        <div class="popup-icon">🚨</div>
        <h2>Limiet Bereikt!</h2>
        <p>Danske Bank AS heeft uw limiet bereikt:</p>
        <div class="popup-price" id="popupPrice">--</div>
        <button class="button button-primary" onclick="closePopup()">Sluiten</button>
    </div>
</div>

<script>
    let monitoringInterval;
    let isMonitoring = false;
    let previousPrice = null;
    let hasAlerted = false;

    const currentPriceEl = document.getElementById('currentPrice');
    const priceChangeEl = document.getElementById('priceChange');
    const priceLimitInput = document.getElementById('priceLimit');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusEl = document.getElementById('status');
    const popupOverlay = document.getElementById('popupOverlay');
    const popupPriceEl = document.getElementById('popupPrice');
    const lastUpdateEl = document.getElementById('lastUpdate');

    // Alert geluid maken met Web Audio API
    function playAlertSound() {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.frequency.value = 800;
        oscillator.type = 'sine';

        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.5);

        // Herhaal 3 keer
        setTimeout(() => {
            const osc2 = audioContext.createOscillator();
            const gain2 = audioContext.createGain();
            osc2.connect(gain2);
            gain2.connect(audioContext.destination);
            osc2.frequency.value = 1000;
            osc2.type = 'sine';
            gain2.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            osc2.start();
            osc2.stop(audioContext.currentTime + 0.5);
        }, 600);
    }

    function showAlert(price) {
        popupPriceEl.textContent = `DKK ${price.toFixed(2)}`;
        popupOverlay.style.display = 'block';
        playAlertSound();
        
        // Vibratie als beschikbaar
        if (navigator.vibrate) {
            navigator.vibrate([200, 100, 200, 100, 200]);
        }
    }

    function closePopup() {
        popupOverlay.style.display = 'none';
    }

    // VERVANG 'YOUR_API_KEY_HERE' met je Alpha Vantage API key
    const ALPHA_VANTAGE_API_KEY = 'DFKDNV5SCQFP41X6';
    
    async function fetchStockPrice() {
        try {
            // Danske Bank op Copenhagen Stock Exchange
            // Alpha Vantage gebruikt DANSKE.CPH als ticker symbol
            const symbol = 'DANSKE.CPH';
            
            const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${ALPHA_VANTAGE_API_KEY}`;
            
            const response = await fetch(url);
            const data = await response.json();
            
            // Check voor error messages
            if (data['Error Message']) {
                throw new Error('Ongeldige ticker of API probleem');
            }
            
            if (data['Note']) {
                throw new Error('API limiet bereikt - wacht 1 minuut');
            }
            
            if (data['Global Quote']) {
                const quote = data['Global Quote'];
                const currentPrice = parseFloat(quote['05. price'] ?? 0);
                const previousClose = parseFloat(quote['08. previous close'] ?? 0);
                const change = parseFloat(quote['09. change'] ?? 0);
                const changePercent = parseFloat(quote['10. change percent']?.replace('%', '') ?? 0);

            return {
                price: currentPrice,
                change,
                changePercent,
                previousClose
                };
            }
            
            throw new Error('Geen data ontvangen van Alpha Vantage');
            
        } catch (error) {
            console.error('Fout bij ophalen koers:', error);
            
            // Toon foutmelding aan gebruiker
            priceChangeEl.textContent = `Fout: ${error.message}`;
            priceChangeEl.className = 'price-change negative';
            
            return null;
        }
    }

    function updatePriceDisplay(stockData) {
        if (!stockData) return;

        currentPriceEl.textContent = `DKK ${stockData.price.toFixed(2)}`;
        
        const changeText = `${stockData.change >= 0 ? '+' : ''}${stockData.change.toFixed(2)} (${stockData.changePercent >= 0 ? '+' : ''}${stockData.changePercent.toFixed(2)}%)`;
        priceChangeEl.textContent = changeText;
        priceChangeEl.className = stockData.change >= 0 ? 'price-change positive' : 'price-change negative';

        const now = new Date();
        lastUpdateEl.textContent = `Laatste update: ${now.toLocaleTimeString('nl-NL')}`;
    }

    async function checkPrice() {
        const stockData = await fetchStockPrice();
        
        if (stockData) {
            updatePriceDisplay(stockData);
            
            const limit = parseFloat(priceLimitInput.value);
            
            if (!isNaN(limit) && stockData.price >= limit && !hasAlerted) {
                showAlert(stockData.price);
                hasAlerted = true;
            }
            
            // Reset alert als prijs weer onder limiet komt
            if (!isNaN(limit) && stockData.price < limit) {
                hasAlerted = false;
            }
        }
    }

    function startMonitoring() {
        const limit = parseFloat(priceLimitInput.value);
        
        if (isNaN(limit) || limit <= 0) {
            alert('Voer een geldig limietbedrag in');
            return;
        }

        isMonitoring = true;
        hasAlerted = false;
        
        startBtn.style.display = 'none';
        stopBtn.style.display = 'block';
        priceLimitInput.disabled = true;
        
        statusEl.className = 'status active';
        statusEl.textContent = `Monitoring actief - Limiet: DKK ${limit.toFixed(2)}`;

        // Direct ophalen
        checkPrice();
        
        // Elke 15 minuten ophalen (900 seconden)
        // Dit betekent maximaal 96 calls per dag, ruim binnen de Alpha Vantage limiet van 25/dag
        monitoringInterval = setInterval(checkPrice, 900000);
    }

    function stopMonitoring() {
        isMonitoring = false;
        clearInterval(monitoringInterval);
        
        startBtn.style.display = 'block';
        stopBtn.style.display = 'none';
        priceLimitInput.disabled = false;
        
        statusEl.className = 'status inactive';
        statusEl.textContent = 'Monitoring is gestopt';
    }

    startBtn.addEventListener('click', startMonitoring);
    stopBtn.addEventListener('click', stopMonitoring);

    // Initiële prijs ophalen bij laden
    fetchStockPrice().then(updatePriceDisplay);
</script>
